<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://fonts.googleapis.com https://fonts.gstatic.com https://*.firebaseio.com https://*.googleapis.com https://*.firebaseapp.com data: blob:;">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mis Finanzas">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#00153d">
<title>Mis Finanzas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* [Tus estilos CSS se mantienen igual para no romper el diseño] */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root { --bg: #00153d; --bg2: #001a4a; --card: rgba(255,255,255,0.07); --text: #FFFFFF; --text2: rgba(255,255,255,0.55); --border: rgba(255,255,255,0.11); --blue: #4D9FFF; --green: #32D74B; --red: #FF453A; --orange: #FF9F0A; --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px); }
html { background: var(--bg); }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 430px; margin: 0 auto; padding-bottom: calc(90px + var(--safe-bottom)); }
.header { padding: calc(52px + var(--safe-top)) 20px 8px; background: var(--bg); position: sticky; top: 0; z-index: 100; }
.header-greeting { font-size: 13px; color: var(--text2); }
.app-title { font-size: 26px; font-weight: 700; color: #fff; }
.hero { background: linear-gradient(135deg, rgba(77,159,255,0.18) 0%, rgba(0,21,61,0) 100%); border: 0.5px solid var(--border); border-radius: 22px; margin: 10px 16px; padding: 18px 20px; }
.hero-amount { font-size: 42px; font-weight: 700; }
.nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: rgba(0,15,45,0.93); backdrop-filter: blur(20px); border-top: 0.5px solid var(--border); display: flex; justify-content: space-around; padding: 8px 0 calc(16px + var(--safe-bottom)); z-index: 200; }
.nav-item { color: var(--text2); background: none; border: none; font-size: 10px; display: flex; flex-direction: column; align-items: center; }
.nav-item.active { color: var(--blue); }
.fab { width: 54px; height: 54px; border-radius: 50%; background: var(--blue); border: none; color: white; font-size: 24px; margin-top: -8px; }
.panel { display: none; } .panel.active { display: block; }
.card { background: var(--card); border-radius: 16px; margin: 10px 16px; border: 0.5px solid var(--border); padding: 15px; }
.field { margin-bottom: 15px; }
.field input, .field select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: white; font-size: 16px; }
.save-btn { width: 100%; padding: 15px; background: var(--blue); border: none; border-radius: 12px; color: white; font-weight: bold; }
/* Estilos de lista y cards simplificados para este bloque */
.list-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
.amount-pos { color: var(--green); } .amount-neg { color: var(--red); }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: flex-end; }
.modal-overlay.visible { display: flex; }
.modal-sheet { width: 100%; background: #071e52; padding: 20px; border-radius: 20px 20px 0 0; }
</style>
</head>
<body>

<div class="header">
    <div class="header-greeting">Hola Fran 👋</div>
    <div class="app-title">Mis Finanzas</div>
    <div id="header-date" style="font-size: 12px; color: var(--text2);"></div>
</div>

<div id="panel-inicio" class="panel active">
    <div class="hero">
        <div style="font-size: 13px; color: var(--text2);">Disponible</div>
        <div class="hero-amount" id="hero-saldo">$0</div>
    </div>
    <div class="card" onclick="abrirEditPochi()">
        <div style="color: var(--text2); font-size: 12px;">TARJETA POCHI</div>
        <div id="pochi-display" style="font-size: 24px; font-weight: bold; color: #CF8EF4;">$0</div>
    </div>
    <div class="card" onclick="abrirEditEnano()">
        <div style="color: var(--text2); font-size: 12px;">DEUDA ENANO</div>
        <div id="enano-display" style="font-size: 24px; font-weight: bold; color: #5AC8FA;">$0</div>
    </div>
    <div class="card" id="recientes-list"></div>
</div>

<div id="panel-cargar" class="panel">
    <div class="card">
        <h3>Nuevo Registro</h3>
        <div class="segment" style="display:flex; gap:5px; margin: 15px 0;">
            <button class="save-btn" onclick="setTipo('gasto')" id="btn-gasto" style="background:var(--red)">Gasto</button>
            <button class="save-btn" onclick="setTipo('ingreso')" id="btn-ingreso" style="background:var(--green)">Ingreso</button>
        </div>
        <div class="field"><input type="number" id="f-monto" placeholder="Monto" inputmode="decimal"></div>
        <div class="field"><input type="text" id="f-concepto" placeholder="Concepto"></div>
        <div class="field"><select id="f-cat"></select></div>
        <button class="save-btn" onclick="guardar()">Guardar en Firebase</button>
        <div id="form-msg" class="form-msg"></div>
    </div>
</div>

<nav class="nav">
    <button class="nav-item active" onclick="switchPanel('inicio', this)">🏠 Inicio</button>
    <button class="fab" onclick="switchPanel('cargar', null)">+</button>
    <button class="nav-item" onclick="switchPanel('inicio', this)">📊 Movs</button>
</nav>

<div class="modal-overlay" id="modal-pochi">
    <div class="modal-sheet">
        <h3>Editar Pochi</h3>
        <input type="number" id="pochi-input" class="field" style="width:100%; padding:10px;">
        <button class="save-btn" onclick="guardarPochi()">Guardar</button>
        <button onclick="cerrarEditPochi()" style="background:none; color:white; width:100%; margin-top:10px; border:none;">Cancelar</button>
    </div>
</div>

<div class="modal-overlay" id="modal-enano">
    <div class="modal-sheet">
        <h3>Editar Enano</h3>
        <select id="enano-signo" class="field"><option value="pos">Me deben</option><option value="neg">Debo</option></select>
        <input type="number" id="enano-input" class="field" style="width:100%; padding:10px;">
        <button class="save-btn" onclick="guardarEnano()">Guardar</button>
        <button onclick="cerrarEditEnano()" style="background:none; color:white; width:100%; margin-top:10px; border:none;">Cancelar</button>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCVlW4tvjTPrZ48_PM4sirT1uRTOP5THKI",
    authDomain: "mis-finanzas-d65e0.firebaseapp.com",
    projectId: "mis-finanzas-d65e0",
    storageBucket: "mis-finanzas-d65e0.firebasestorage.app",
    messagingSenderId: "249017917046",
    appId: "1:249017917046:web:198ad17d39b88eae86c957",
    measurementId: "G-GD4BBRKB8W"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const docRef = doc(db, "ajustes", "globales");
  const CLAVE_SEGURA = "fs2026"; // Mantené esta igual en las reglas de Firebase

  // Variables Globales
  window.data = JSON.parse(localStorage.getItem('fs_data')) || [];
  window.pochiMonto = parseFloat(localStorage.getItem('fs_pochi')) || 0;
  window.enanoMonto = parseFloat(localStorage.getItem('fs_enano')) || 0;
  window.cats = ['Alimentos','Delfi','Efectivo','Gastos FS','Impuestos','Meli','Ocio','Salud','Servicios','Suscripciones','Pochi','Transporte'];

  // Función Guardar Sincronizada
  window.save = async () => {
    try {
        await setDoc(docRef, {
            data: window.data,
            pochiMonto: window.pochiMonto,
            enanoMonto: window.enanoMonto,
            cats: window.cats,
            clave: CLAVE_SEGURA,
            lastUpdate: Date.now()
        });
        localStorage.setItem('fs_data', JSON.stringify(window.data));
        renderInicio();
    } catch (e) {
        console.error("Error sincronizando:", e);
        alert("Error de permisos en Firebase");
    }
  };

  // Escuchar cambios en tiempo real
  onSnapshot(docRef, (snap) => {
    if (snap.exists()) {
      const d = snap.data();
      window.data = d.data || [];
      window.pochiMonto = d.pochiMonto || 0;
      window.enanoMonto = d.enanoMonto || 0;
      renderInicio();
    }
  });

  // Funciones de la App asignadas a window para que funcionen desde el HTML
  window.renderInicio = () => {
    const saldo = data.reduce((s, d) => s + (d.tipo === 'ingreso' ? d.monto : -d.monto), 0);
    document.getElementById('hero-saldo').textContent = fmt(saldo);
    document.getElementById('pochi-display').textContent = fmt(pochiMonto);
    document.getElementById('enano-display').textContent = fmt(enanoMonto);
    
    const list = document.getElementById('recientes-list');
    list.innerHTML = '<h4>Recientes</h4>' + data.slice(-5).reverse().map(d => `
        <div class="list-row">
            <span>${d.concepto}</span>
            <span class="${d.tipo==='ingreso'?'amount-pos':'amount-neg'}">${fmt(d.monto)}</span>
        </div>
    `).join('');
  };

  window.fmt = (n) => '$' + Math.abs(Math.round(n)).toLocaleString('es-AR');

  window.guardar = () => {
    const m = parseFloat(document.getElementById('f-monto').value);
    const c = document.getElementById('f-concepto').value;
    if(!m || !c) return;
    window.data.push({tipo: window.tipoSel, monto: m, concepto: c, cat: document.getElementById('f-cat').value, fecha: new Date().toISOString()});
    window.save();
    document.getElementById('f-monto').value = '';
    document.getElementById('f-concepto').value = '';
    switchPanel('inicio', document.querySelectorAll('.nav-item')[0]);
  };

  window.tipoSel = 'gasto';
  window.setTipo = (t) => { window.tipoSel = t; };

  window.switchPanel = (name, btn) => {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    if(btn) {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        btn.classList.add('active');
    }
    if(name === 'cargar') {
        const sel = document.getElementById('f-cat');
        sel.innerHTML = window.cats.map(c => `<option value="${c}">${c}</option>`).join('');
    }
  };

  window.abrirEditPochi = () => document.getElementById('modal-pochi').classList.add('visible');
  window.cerrarEditPochi = () => document.getElementById('modal-pochi').classList.remove('visible');
  window.guardarPochi = () => { window.pochiMonto = parseFloat(document.getElementById('pochi-input').value); window.save(); cerrarEditPochi(); };

  window.abrirEditEnano = () => document.getElementById('modal-enano').classList.add('visible');
  window.cerrarEditEnano = () => document.getElementById('modal-enano').classList.remove('visible');
  window.guardarEnano = () => { 
    const v = parseFloat(document.getElementById('enano-input').value);
    window.enanoMonto = document.getElementById('enano-signo').value === 'neg' ? -v : v;
    window.save(); cerrarEditEnano(); 
  };

  // Inicio
  renderInicio();
</script>
</body>
</html>
