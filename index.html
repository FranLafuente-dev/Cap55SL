<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com; script-src * 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com; connect-src * 'unsafe-inline'; img-src * data: blob: 'unsafe-inline'; style-src * 'unsafe-inline';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cap55SL</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cap55SL">
    <link rel="apple-touch-icon" href="icono.png">
    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --azul-marino: #001F5B;
            --bg: #ffffff;
            --bg2: #f8f9fa;
            --text: #1a1a1b;
            --text2: #6c757d;
            --danger: #dc3545;
            --success: #198754;
            --warning: #f59e0b;
            --border: #e9ecef;
            --radius: 16px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --bg2: #1e293b;
                --text: #f8fafc;
                --text2: #94a3b8;
                --border: #334155;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding-bottom: 100px; 
            padding-top: env(safe-area-inset-top);
        }

        .container { padding: 20px; max-width: 600px; margin: 0 auto; }

        /* Cabecera y Resumen Rápido */
        header { margin-bottom: 24px; }
        .main-card { 
            background: var(--azul-marino); 
            color: white; 
            padding: 24px; 
            border-radius: var(--radius); 
            box-shadow: 0 10px 25px rgba(0,31,91,0.2);
            margin-bottom: 20px;
        }
        .main-card h2 { font-size: 14px; opacity: 0.8; font-weight: 400; }
        .main-card .balance { font-size: 32px; font-weight: 700; margin: 5px 0; }
        
        .deficit-box {
            background: var(--bg2);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: var(--radius);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        /* Tabs Inferiores Estilo iOS */
        nav.tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
            border-top: 1px solid var(--border);
            z-index: 100;
        }
        .tab-item { border: none; background: none; color: var(--text2); font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
        .tab-item.active { color: var(--azul-marino); font-weight: 600; }

        /* Botón Flotante + */
        .fab {
            position: fixed;
            bottom: 90px;
            right: 25px;
            background: var(--azul-marino);
            color: white;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border: none;
            z-index: 101;
            transition: transform 0.2s;
        }
        .fab:active { transform: scale(0.9); }

        /* Listas y Tablas */
        .panel { display: none; }
        .panel.active { display: block; }
        .item-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 15px 0; 
            border-bottom: 1px solid var(--border);
            align-items: center;
        }
        .item-info div:first-child { font-weight: 500; font-size: 15px; }
        .item-info div:last-child { font-size: 12px; color: var(--text2); }
        .item-amount { font-weight: 600; text-align: right; }

        /* Formularios */
        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); display: none; z-index: 200; 
            align-items: flex-end;
        }
        .modal-content { 
            background: var(--bg); width: 100%; padding: 30px; 
            border-radius: 30px 30px 0 0; animation: slideUp 0.3s ease-out; 
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        input, select { 
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; 
            border: 1px solid var(--border); background: var(--bg2); 
            color: var(--text); font-size: 16px; 
        }
        .btn-save { 
            width: 100%; padding: 16px; border-radius: 12px; border: none; 
            background: var(--azul-marino); color: white; font-weight: 600; font-size: 16px;
        }

        .chart-container { width: 100%; height: 300px; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="panel-home" class="panel active">
        <header>
            <h1 style="font-size: 24px; margin-bottom: 20px;">Hola Fran 👋</h1>
            <div class="main-card">
                <h2>Saldo en Cuenta (Ingresos - Gastos)</h2>
                <div class="balance" id="display-saldo-cuenta">$0</div>
                <div style="font-size: 12px; opacity: 0.8;" id="display-mes-actual"></div>
            </div>
            
            <div class="deficit-box">
                <div>
                    <div style="font-size: 11px; color: var(--text2); text-transform: uppercase;">Pendiente de Pago</div>
                    <div style="font-size: 18px; font-weight: 600; color: var(--warning);" id="display-pendiente">$0</div>
                </div>
                <div style="text-align: right;">
                    <div style="font-size: 11px; color: var(--text2); text-transform: uppercase;">Saldo Real (Déficit)</div>
                    <div style="font-size: 18px; font-weight: 600; color: var(--danger);" id="display-saldo-real">$0</div>
                </div>
            </div>
        </header>

        <h3 style="margin-bottom: 15px;">Movimientos Recientes</h3>
        <div id="lista-recientes"></div>
    </div>

    <div id="panel-resumen" class="panel">
        <h1>Resumen Mensual</h1>
        <select id="filtro-mes" onchange="renderResumen()" style="margin-top: 15px;"></select>
        
        <div class="chart-container">
            <canvas id="chartMensual"></canvas>
        </div>
        
        <button class="btn-save" style="background: var(--bg2); color: var(--azul-marino); margin-bottom: 20px;" onclick="descargarGrafico()">
            📥 Descargar Reporte
        </button>

        <div id="resumen-categorias"></div>
    </div>

    <div id="panel-config" class="panel">
        <h1>Configuración</h1>
        <div class="st" style="margin: 20px 0 10px;">Mis Categorías</div>
        <div id="lista-categorias"></div>
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <input type="text" id="nueva-cat-nombre" placeholder="Nueva cat..." style="margin:0">
            <button class="btn-save" style="width: 80px;" onclick="agregarCategoria()">+</button>
        </div>
    </div>
</div>

<button class="fab" onclick="abrirModal()">+</button>

<div class="modal" id="modal-carga">
    <div class="modal-content">
        <div style="display:flex; justify-content: space-between; margin-bottom: 20px;">
            <h2 id="modal-titulo">Nueva Carga</h2>
            <button onclick="cerrarModal()" style="border:none; background:none; font-size: 20px; color: var(--text2);">✕</button>
        </div>
        
        <input type="hidden" id="edit-id">
        <select id="f-tipo" onchange="actualizarSelectCategorias()">
            <option value="gasto">Gasto Realizado</option>
            <option value="ingreso">Ingreso</option>
            <option value="pendiente">Pendiente de Pago</option>
        </select>
        
        <input type="text" id="f-concepto" placeholder="Concepto (ej. Alquiler)">
        <input type="number" id="f-monto" placeholder="Monto $">
        <select id="f-cat"></select>
        <input type="month" id="f-fecha">
        
        <button class="btn-save" onclick="guardarMovimiento()">Guardar</button>
        <button id="btn-eliminar" class="btn-save" style="background: var(--danger); margin-top: 10px; display: none;" onclick="eliminarMovimiento()">Eliminar</button>
    </div>
</div>

<nav class="tab-bar">
    <button class="tab-item active" onclick="switchTab('home', this)"><span>🏠</span>Inicio</button>
    <button class="tab-item" onclick="switchTab('resumen', this)"><span>📊</span>Resumen</button>
    <button class="tab-item" onclick="switchTab('config', this)"><span>⚙️</span>Categorías</button>
</nav>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<script>
    // ESTADO DE LA APP
    let db = JSON.parse(localStorage.getItem('cap55_db')) || { movimientos: [], categorias: ['Alimentos', 'Salud', 'Hogar', 'Ocio', 'Servicios'] };
    let chartInstance = null;

    function save() { localStorage.setItem('cap55_db', JSON.stringify(db)); }

    // NAVEGACIÓN
    function switchTab(panelId, btn) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
        document.getElementById('panel-' + panelId).classList.add('active');
        btn.classList.add('active');
        if(panelId === 'home') renderHome();
        if(panelId === 'resumen') renderResumen();
        if(panelId === 'config') renderConfig();
    }

    // MODAL
    function abrirModal(editId = null) {
        const modal = document.getElementById('modal-carga');
        const btnDel = document.getElementById('btn-eliminar');
        actualizarSelectCategorias();
        document.getElementById('f-fecha').value = new Date().toISOString().slice(0, 7);
        
        if(editId) {
            const m = db.movimientos.find(x => x.id === editId);
            document.getElementById('edit-id').value = m.id;
            document.getElementById('f-tipo').value = m.tipo;
            document.getElementById('f-concepto').value = m.concepto;
            document.getElementById('f-monto').value = m.monto;
            document.getElementById('f-cat').value = m.cat;
            document.getElementById('f-fecha').value = m.fecha;
            btnDel.style.display = 'block';
            document.getElementById('modal-titulo').innerText = "Editar";
        } else {
            document.getElementById('edit-id').value = "";
            document.getElementById('f-concepto').value = "";
            document.getElementById('f-monto').value = "";
            btnDel.style.display = 'none';
            document.getElementById('modal-titulo').innerText = "Nueva Carga";
        }
        modal.style.display = 'flex';
    }

    function cerrarModal() { document.getElementById('modal-carga').style.display = 'none'; }

    // LOGICA DE DATOS
    function guardarMovimiento() {
        const id = document.getElementById('edit-id').value;
        const mov = {
            id: id ? parseInt(id) : Date.now(),
            tipo: document.getElementById('f-tipo').value,
            concepto: document.getElementById('f-concepto').value,
            monto: parseFloat(document.getElementById('f-monto').value),
            cat: document.getElementById('f-cat').value,
            fecha: document.getElementById('f-fecha').value
        };

        if(!mov.concepto || !mov.monto) return alert("Completa concepto y monto");

        if(id) {
            const index = db.movimientos.findIndex(x => x.id === parseInt(id));
            db.movimientos[index] = mov;
        } else {
            db.movimientos.push(mov);
        }
        
        save();
        cerrarModal();
        renderHome();
    }

    function eliminarMovimiento() {
        const id = parseInt(document.getElementById('edit-id').value);
        db.movimientos = db.movimientos.filter(x => x.id !== id);
        save();
        cerrarModal();
        renderHome();
    }

    function renderHome() {
        const mesActual = new Date().toISOString().slice(0, 7);
        document.getElementById('display-mes-actual').innerText = new Date().toLocaleDateString('es-AR', {month:'long', year:'numeric'});
        
        const movsMes = db.movimientos.filter(m => m.fecha === mesActual);
        
        const ingresos = movsMes.filter(m => m.tipo === 'ingreso').reduce((s, m) => s + m.monto, 0);
        const gastos = movsMes.filter(m => m.tipo === 'gasto').reduce((s, m) => s + m.monto, 0);
        const pendientes = db.movimientos.filter(m => m.tipo === 'pendiente').reduce((s, m) => s + m.monto, 0);
        
        const saldoCuenta = ingresos - gastos;
        const saldoReal = saldoCuenta - pendientes;

        document.getElementById('display-saldo-cuenta').innerText = `$${saldoCuenta.toLocaleString('es-AR')}`;
        document.getElementById('display-pendiente').innerText = `$${pendientes.toLocaleString('es-AR')}`;
        document.getElementById('display-saldo-real').innerText = `$${saldoReal.toLocaleString('es-AR')}`;

        const lista = document.getElementById('lista-recientes');
        const ultimos = [...db.movimientos].sort((a,b) => b.id - a.id).slice(0, 10);
        
        lista.innerHTML = ultimos.map(m => `
            <div class="item-row" onclick="abrirModal(${m.id})">
                <div class="item-info">
                    <div>${m.concepto}</div>
                    <div>${m.cat} • ${m.fecha}</div>
                </div>
                <div class="item-amount" style="color: ${m.tipo === 'ingreso' ? 'var(--success)' : (m.tipo === 'pendiente' ? 'var(--warning)' : 'var(--danger)')}">
                    ${m.tipo === 'ingreso' ? '+' : '-'}$${m.monto.toLocaleString('es-AR')}
                </div>
            </div>
        `).join('');
    }

    function renderResumen() {
        const filtro = document.getElementById('filtro-mes');
        const mesesUnicos = [...new Set(db.movimientos.map(m => m.fecha))].sort().reverse();
        
        if(filtro.innerHTML === "") {
            filtro.innerHTML = mesesUnicos.map(m => `<option value="${m}">${m}</option>`).join('');
        }

        const mesSel = filtro.value || mesesUnicos[0];
        const movs = db.movimientos.filter(m => m.fecha === mesSel && m.tipo !== 'ingreso');
        
        const catsData = {};
        movs.forEach(m => catsData[m.cat] = (catsData[m.cat] || 0) + m.monto);

        const ctx = document.getElementById('chartMensual').getContext('2d');
        if(chartInstance) chartInstance.destroy();
        
        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(catsData),
                datasets: [{
                    data: Object.values(catsData),
                    backgroundColor: ['#001F5B', '#198754', '#dc3545', '#f59e0b', '#6366f1', '#ec4899']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
        });

        document.getElementById('resumen-categorias').innerHTML = Object.entries(catsData).map(([cat, monto]) => `
            <div class="item-row">
                <span>${cat}</span>
                <span style="font-weight:600">$${monto.toLocaleString('es-AR')}</span>
            </div>
        `).join('');
    }

    function renderConfig() {
        document.getElementById('lista-categorias').innerHTML = db.categorias.map(c => `
            <div class="item-row">
                <span>${c}</span>
                <button onclick="eliminarCategoria('${c}')" style="color:var(--danger); border:none; background:none;">Eliminar</button>
            </div>
        `).join('');
    }

    function actualizarSelectCategorias() {
        document.getElementById('f-cat').innerHTML = db.categorias.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function agregarCategoria() {
        const nom = document.getElementById('nueva-cat-nombre').value.trim();
        if(nom && !db.categorias.includes(nom)) {
            db.categorias.push(nom);
            save();
            renderConfig();
            document.getElementById('nueva-cat-nombre').value = "";
        }
    }

    function eliminarCategoria(c) {
        db.categorias = db.categorias.filter(x => x !== c);
        save();
        renderConfig();
    }

    function descargarGrafico() {
        const link = document.createElement('a');
        link.download = 'reporte-cap55sl.png';
        link.href = document.getElementById('chartMensual').toDataURL();
        link.click();
    }

    // Inicio
    renderHome();
</script>

</body>
</html>
